            <script>function neighbourhoodHighlight(params) {
  // console.log("in nieghbourhoodhighlight");
  allNodes = nodes.get({ returnType: "Object" });
  // originalNodes = JSON.parse(JSON.stringify(allNodes));
  // if something is selected:
  if (params.nodes.length > 0) {
    highlightActive = true;
    var i, j;
    var selectedNode = params.nodes[0];
    var degrees = 2;

    // mark all nodes as hard to read.
    for (let nodeId in allNodes) {
      // nodeColors[nodeId] = allNodes[nodeId].color;
      allNodes[nodeId].color = "rgba(200,200,200,0.5)";
      if (allNodes[nodeId].hiddenLabel === undefined) {
        allNodes[nodeId].hiddenLabel = allNodes[nodeId].label;
        allNodes[nodeId].label = undefined;
      }
    }
    var connectedNodes = network.getConnectedNodes(selectedNode);
    var allConnectedNodes = [];

    // get the second degree nodes
    for (i = 1; i < degrees; i++) {
      for (j = 0; j < connectedNodes.length; j++) {
        allConnectedNodes = allConnectedNodes.concat(
          network.getConnectedNodes(connectedNodes[j])
        );
      }
    }

    // all second degree nodes get a different color and their label back
    for (i = 0; i < allConnectedNodes.length; i++) {
      // allNodes[allConnectedNodes[i]].color = "pink";
      allNodes[allConnectedNodes[i]].color = "rgba(150,150,150,0.75)";
      if (allNodes[allConnectedNodes[i]].hiddenLabel !== undefined) {
        allNodes[allConnectedNodes[i]].label =
          allNodes[allConnectedNodes[i]].hiddenLabel;
        allNodes[allConnectedNodes[i]].hiddenLabel = undefined;
      }
    }

    // all first degree nodes get their own color and their label back
    for (i = 0; i < connectedNodes.length; i++) {
      // allNodes[connectedNodes[i]].color = undefined;
      allNodes[connectedNodes[i]].color = nodeColors[connectedNodes[i]];
      if (allNodes[connectedNodes[i]].hiddenLabel !== undefined) {
        allNodes[connectedNodes[i]].label =
          allNodes[connectedNodes[i]].hiddenLabel;
        allNodes[connectedNodes[i]].hiddenLabel = undefined;
      }
    }

    // the main node gets its own color and its label back.
    // allNodes[selectedNode].color = undefined;
    allNodes[selectedNode].color = nodeColors[selectedNode];
    if (allNodes[selectedNode].hiddenLabel !== undefined) {
      allNodes[selectedNode].label = allNodes[selectedNode].hiddenLabel;
      allNodes[selectedNode].hiddenLabel = undefined;
    }
  } else if (highlightActive === true) {
    // console.log("highlightActive was true");
    // reset all nodes
    for (let nodeId in allNodes) {
      // allNodes[nodeId].color = "purple";
      allNodes[nodeId].color = nodeColors[nodeId];
      // delete allNodes[nodeId].color;
      if (allNodes[nodeId].hiddenLabel !== undefined) {
        allNodes[nodeId].label = allNodes[nodeId].hiddenLabel;
        allNodes[nodeId].hiddenLabel = undefined;
      }
    }
    highlightActive = false;
  }

  // transform the object into an array
  var updateArray = [];
  if (params.nodes.length > 0) {
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        // console.log(allNodes[nodeId]);
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  } else {
    // console.log("Nothing was selected");
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        // console.log(allNodes[nodeId]);
        // allNodes[nodeId].color = {};
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  }
}

function filterHighlight(params) {
  allNodes = nodes.get({ returnType: "Object" });
  // if something is selected:
  if (params.nodes.length > 0) {
    filterActive = true;
    let selectedNodes = params.nodes;

    // hiding all nodes and saving the label
    for (let nodeId in allNodes) {
      allNodes[nodeId].hidden = true;
      if (allNodes[nodeId].savedLabel === undefined) {
        allNodes[nodeId].savedLabel = allNodes[nodeId].label;
        allNodes[nodeId].label = undefined;
      }
    }

    for (let i=0; i < selectedNodes.length; i++) {
      allNodes[selectedNodes[i]].hidden = false;
      if (allNodes[selectedNodes[i]].savedLabel !== undefined) {
        allNodes[selectedNodes[i]].label = allNodes[selectedNodes[i]].savedLabel;
        allNodes[selectedNodes[i]].savedLabel = undefined;
      }
    }

  } else if (filterActive === true) {
    // reset all nodes
    for (let nodeId in allNodes) {
      allNodes[nodeId].hidden = false;
      if (allNodes[nodeId].savedLabel !== undefined) {
        allNodes[nodeId].label = allNodes[nodeId].savedLabel;
        allNodes[nodeId].savedLabel = undefined;
      }
    }
    filterActive = false;
  }

  // transform the object into an array
  var updateArray = [];
  if (params.nodes.length > 0) {
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  } else {
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  }
}

function selectNode(nodes) {
  network.selectNodes(nodes);
  neighbourhoodHighlight({ nodes: nodes });
  return nodes;
}

function selectNodes(nodes) {
  network.selectNodes(nodes);
  filterHighlight({nodes: nodes});
  return nodes;
}

function highlightFilter(filter) {
  let selectedNodes = []
  let selectedProp = filter['property']
  if (filter['item'] === 'node') {
    let allNodes = nodes.get({ returnType: "Object" });
    for (let nodeId in allNodes) {
      if (allNodes[nodeId][selectedProp] && filter['value'].includes((allNodes[nodeId][selectedProp]).toString())) {
        selectedNodes.push(nodeId)
      }
    }
  }
  else if (filter['item'] === 'edge'){
    let allEdges = edges.get({returnType: 'object'});
    // check if the selected property exists for selected edge and select the nodes connected to the edge
    for (let edge in allEdges) {
      if (allEdges[edge][selectedProp] && filter['value'].includes((allEdges[edge][selectedProp]).toString())) {
        selectedNodes.push(allEdges[edge]['from'])
        selectedNodes.push(allEdges[edge]['to'])
      }
    }
  }
  selectNodes(selectedNodes)
}</script>

have to be carried out to achieve the operational story main and alternative goals?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "O2_ODIK", "color": "#ff2244", "domain": "Operational", "id": "_19_0_4_26f0132_1631280350392_855780_562", "image": "vp.png", "label": "Operational Domain Item Kind Viewpoint", "name": "Operational Domain Item Kind Viewpoint", "purpose": "The Operational Domain Item Kind Viewpoint captures enterprise wide concepts and collects type definitions for any exchanged item of the Operational Domain. Its purpose is to define these item types and their relationships.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#808080", "id": "_19_0_2_ebf0350_1554653234809_156018_43552", "image": "sth.png", "label": "Regulation Authority", "name": "Regulation Authority", "shape": "image", "size": 32, "type": "stakeholder"}, {"color": "#F000F0", "id": "_2021x_2_6d8019d_1693570065115_738458_24748", "image": "conc.png", "label": "Why types of exchange can exist between Operational Performers (i.e., flows of information, people, material, or energy)?", "name": "Why types of exchange can exist between Operational Performers (i.e., flows of information, people, material, or energy)?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "O2_OPRF", "color": "#ff2244", "domain": "Operational", "id": "_19_0_3_6d8019d_1599070472635_176306_252", "image": "vp.png", "label": "Operational Performer Definition Viewpoint", "name": "Operational Performer Definition Viewpoint", "purpose": "The Operational Performer Definition Viewpoint represents the taxonomy of the identified Operational Performers, if existing and relevant for the understanding of the operation of the intended solution. ", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759040_585536_23465", "image": "conc.png", "label": "What are the relationships between the partys involved in the operation of the intended solution?", "name": "What are the relationships between the partys involved in the operation of the intended solution?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759028_333016_23460", "image": "conc.png", "label": "What partys of the organization, enterprise, or operational entity are needed to achieve an intended operational capability?", "name": "What partys of the organization, enterprise, or operational entity are needed to achieve an intended operational capability?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "O8_OPRM", "color": "#ff2244", "domain": "Operational", "id": "_19_0_3_26f0132_1601459636216_111430_6921", "image": "vp.png", "label": "Operational Process Mapping Viewpoint", "name": "Operational Process Mapping Viewpoint", "purpose": "The Operational Process Mapping Viewpoint describes the relationships of Operational Processes. The reasoning for Operational Processes from Operational Stories and their contribution to Capabilities is described. The assignment of Operational Processes to Operational Performers is captured.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758928_485242_23392", "image": "conc.png", "label": "Show in a concise manner the relationships from operational process to operational story and to operational performer.", "name": "Show in a concise manner the relationships from operational process to operational story and to operational performer.", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "O3_OPRO", "color": "#ff2244", "domain": "Operational", "id": "_19_0_3_8710274_1581675958756_500127_50979", "image": "vp.png", "label": "Operational Process Viewpoint", "name": "Operational Process Viewpoint", "purpose": "The Operational Process Viewpoint describes the Operational Processes related to a specific Operational Story, the sequence of execution, and their Operational Exchanges, including information, materials, natural resources, etc. The assignment of Operational Processes to Operational Performers is captured.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759250_575950_23644", "image": "conc.png", "label": "What operational process activities shall be executed during the execution of an operational story?", "name": "What operational process activities shall be executed during the execution of an operational story?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758680_939269_23154", "image": "conc.png", "label": "Which operational activity shall be executed by which operational performer in the operational story?", "name": "Which operational activity shall be executed by which operational performer in the operational story?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "O3_OSTA", "color": "#ff2244", "domain": "Operational", "id": "_2024x_2_26f0132_1751004870294_93250_27", "image": "vp.png", "label": "Operational State Viewpoint", "name": "Operational State Viewpoint", "purpose": "The viewpoint defines modes of operation for the prosed system (such as normal, on-road, degraded, war-time, maintenance, training etc.) which apply not only to the SOI but also to involved personnel.\nAn operational mode defines a potential life-cycle selection for the SOI which has a relevant impact for the SOI\u2019s stakeholder/users w.r.t. to the operations. [tbd]", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2024x_2_26f0132_1751005177169_420757_1216", "image": "conc.png", "label": "What operational states are defined for a system or system\u0027s operation?", "name": "What operational states are defined for a system or system\u0027s operation?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2024x_2_26f0132_1751005074373_263380_1200", "image": "conc.png", "label": "Which operational processes are possible to be performed in an operational state?", "name": "Which operational processes are possible to be performed in an operational state?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2024x_2_26f0132_1751632678372_112390_48", "image": "conc.png", "label": "Which operational states are possible results of performing an operational process?", "name": "Which operational states are possible results of performing an operational process?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "O1_OSTY", "color": "#ff2244", "domain": "Operational", "id": "_19_0_2_26f0132_1561750369203_901730_48359", "image": "vp.png", "label": "Operational Story Viewpoint", "name": "Operational Story Viewpoint", "purpose": "The Operational Story Viewpoint\n* captures operational stories within operational contexts and their relation to operational performers, thus enables storytelling\n* illustrates the operational background from the Stakeholder perspective\n* serves as starting point to identify Stakeholders and/or context elements\n* fosters the communication among different Stakeholders", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758881_297740_23364", "image": "conc.png", "label": "Which is the operational scenario, i.e., course of action, for the mission and the context in which the system of systems solution will exist?", "name": "Which is the operational scenario, i.e., course of action, for the mission and the context in which the system of systems solution will exist?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "P1_PCXD", "color": "#ff2244", "domain": "Physical", "id": "_19_0_1_26f0132_1547202202696_824153_42420", "image": "vp.png", "label": "Physical Context Definition Viewpoint", "name": "Physical Context Definition Viewpoint", "purpose": "The Physical Context Definition Viewpoint identifies the various contexts the SOI is used in, along with the associated external entities sharing a physical interface with the system. For each context, the applicable environmental conditions shall be defined. The physical context helps identify the interface requirements needed to integrate a system into its environment in a given context.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758710_759449_23186", "image": "conc.png", "label": "Which are the external physical entities the system interacts with in the given context?", "name": "Which are the external physical entities the system interacts with in the given context?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758891_776196_23368", "image": "conc.png", "label": "Which are the given contexts the system is embedded and utilized in?", "name": "Which are the given contexts the system is embedded and utilized in?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759091_673143_23507", "image": "conc.png", "label": "Which interface partners does the system have?", "name": "Which interface partners does the system have?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "P1_PCXE", "color": "#ff2244", "domain": "Physical", "id": "_19_0_2_26f0132_1562303526536_79296_92554", "image": "vp.png", "label": "Physical Context Exchange Viewpoint", "name": "Physical Context Exchange Viewpoint", "purpose": "The Physical Context Exchange Viewpoint focuses on the identification of the physical interfaces with external entities and relevant documentation. It is used to capture interface design requirements, applicable standards, protocols and format specifications, that are agreed upon the interfaces.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759247_884832_23642", "image": "conc.png", "label": "Which are the protocols for exchanging physical items on a specific interface?", "name": "Which are the protocols for exchanging physical items on a specific interface?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758698_132348_23172", "image": "conc.png", "label": "Which kind of physical items (energy, material, information, etc.) are exchanged between the system and external entities?", "name": "Which kind of physical items (energy, material, information, etc.) are exchanged between the system and external entities?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758561_575110_23056", "image": "conc.png", "label": "Which kind of physical items (energy, material, information, etc.) are used on an interface of a physical architecture element?", "name": "Which kind of physical items (energy, material, information, etc.) are used on an interface of a physical architecture element?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758932_916610_23397", "image": "conc.png", "label": "Which requirements apply to a physical interface?", "name": "Which requirements apply to a physical interface?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758891_215548_23373", "image": "conc.png", "label": "Which standards, protocols, and format specifications apply to a physical interface?", "name": "Which standards, protocols, and format specifications apply to a physical interface?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "P2_PETD", "color": "#ff2244", "domain": "Physical", "id": "_2024x_3_26f0132_1758913515809_605410_39", "image": "vp.png", "label": "Physical Exchange Type Definition Viewpoint", "name": "Physical Exchange Type Definition Viewpoint", "purpose": "The Physical Exchange Type Definition Viewpoint captures type definitions on design level for any exchanged or stored items, e.g., information, material, or energy, of the Physical Domain. Its purpose is to define these item types, their properties and their relationships. It also shows the traceability of these items to the conceptual layer (Functional and Logical Domain)\n", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2024x_3_26f0132_1758917108502_438726_3067", "image": "conc.png", "label": "From which conceptual item (energy, material, information) is a physical item derived?", "name": "From which conceptual item (energy, material, information) is a physical item derived?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1697542838788_945785_24608", "image": "conc.png", "label": "Which kind of physical items (energy, material, information, etc.) are used in the physical architecture of the system?", "name": "Which kind of physical items (energy, material, information, etc.) are used in the physical architecture of the system?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "P8_PFUM", "color": "#ff2244", "domain": "Physical", "id": "_2021x_2_8710274_1675987942868_617787_33116", "image": "vp.png", "label": "Physical Functional Mapping Viewpoint", "name": "Physical Functional Mapping Viewpoint", "purpose": "The Physical Functional Mapping Viewpoint supports the analysis of the assigment of system functions and system partial functions to physical system elements. The result shall be computed from the assigment of functions to logial system elements and the assignment of logical system elements to physical system elements", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758941_524652_23399", "image": "conc.png", "label": "What is the mapping of functions to the physical SOI physical architecture?", "name": "What is the mapping of functions to the physical SOI physical architecture?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759216_889664_23621", "image": "conc.png", "label": "Which functions and services need to be implemented in SW?", "name": "Which functions and services need to be implemented in SW?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758889_521511_23366", "image": "conc.png", "label": "Which functions need to be implemented in HW?", "name": "Which functions need to be implemented in HW?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1698399553646_852568_33150", "image": "conc.png", "label": "Which system funcions need to be tested in IV\u0026V activities?", "name": "Which system funcions need to be tested in IV\u0026V activities?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1698399897245_206032_33220", "image": "conc.png", "label": "which functions need to be realized by mechanical design", "name": "which functions need to be realized by mechanical design", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "P5_PIFD", "color": "#ff2244", "domain": "Physical", "id": "_2021x_2_8710274_1695205330608_177015_24335", "image": "vp.png", "label": "Physical Interface Definition Viewpoint", "name": "Physical Interface Definition Viewpoint", "purpose": "The Physical Interface Definition Viewpoint captures definitions for physical interfaces. It allows to adopt long-lived standards and to harmonize physical interface definitions to improve interchangeability, interoperability, and portability.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1698695280731_979013_48719", "image": "conc.png", "label": "Which are the interface definitions for the physical architecture?", "name": "Which are the interface definitions for the physical architecture?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759093_319282_23509", "image": "conc.png", "label": "Which are the protocols used for exchanging information?", "name": "Which are the protocols used for exchanging information?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1698695217112_237670_48715", "image": "conc.png", "label": "what are the interface definitions for physical elements", "name": "what are the interface definitions for physical elements", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "P4_PIEX", "color": "#ff2244", "domain": "Physical", "id": "_2021x_2_8710274_1674680950433_310726_23659", "image": "vp.png", "label": "Physical Internal Exchange Viewpoint", "name": "Physical Internal Exchange Viewpoint", "purpose": "The Physical Internal Exchange Viewpoint serves for the identification and definition of interfaces of elements of the physical system. also, the delegation of system element interfaces to the physical system boundary interfaces is covered.\nThe Physical Internal Exchange Viewpoint\n* identifies system element interfaces on a physical level\n* states to which other physical elements the interfaces are connected to\n* assigns physical interface definitions to interfaces\n* defines the usage of interfaces, e.g., if only a subset of the interfaces is used\n* defines the delegation of physical system element interfaces to physical system boundary interfaces", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758600_423008_23078", "image": "conc.png", "label": "How do physical system elements interact to provide system functions?", "name": "How do physical system elements interact to provide system functions?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758718_586539_23194", "image": "conc.png", "label": "How do the physical system elements interact to provide the system function?", "name": "How do the physical system elements interact to provide the system function?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1698410513910_480926_28625", "image": "conc.png", "label": "Which physical items (energy, material, information, etc.) are exchanged within the system?", "name": "Which physical items (energy, material, information, etc.) are exchanged within the system?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "P8_PLIM", "color": "#ff2244", "domain": "Physical", "id": "_2021x_2_8710274_1698415722718_711881_60045", "image": "vp.png", "label": "Physical Logical Item Mapping Viewpoint", "name": "Physical Logical Item Mapping Viewpoint", "purpose": "The Physical Logical Item Mapping Viewpoint specifies the realization of the System Domain Kinds by Physical Exchange Kinds.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1698399385413_529894_33129", "image": "conc.png", "label": "Which logical elements are allocated to which physical elements?", "name": "Which logical elements are allocated to which physical elements?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "P8_PLOM", "color": "#ff2244", "domain": "Physical", "id": "_2021x_2_8710274_1676724435544_523379_27331", "image": "vp.png", "label": "Physical Logical Mapping Viewpoint", "name": "Physical Logical Mapping Viewpoint", "purpose": "The Physical Logical Mapping Viewpoint  supports the definition of the realization of conceptual logical system elements by physical system elements comprising the SOI.\n\nFollowing the identification of physical system elements capable of performing the system functions of logical elements, the Physical Logical Mapping Viewpoint provides feedback to the System Architecture Definition process to consolidate or confirm the allocation, partitioning, and alignment of logical elements to physical elements that comprise the SOI.", "shape": "image", "size": 32, "type": "viewpoint"}, {"VP_ID": "P2_PSTD", "color": "#ff2244", "domain": "Physical", "id": "_19_0_3_ebf0350_1580652072992_42812_53692", "image": "vp.png", "label": "Physical Structure Definition Viewpoint", "name": "Physical Structure Definition Viewpoint", "purpose": "The Physical Structure Viewpoint is used to model the internal structure of the SOI and to identify the internal system elements making up the SOI. The SOI breakdown structure identifies system elements and finally at the implementation level hardware, software, and mechanics. The SOI breakdown structure determines items that are reused and make-or-buy (COTS) items. The Physical Structure Viewpoint is elaborated for each candidate physical SOI architecture. It provides the basis for further assessment of the architecture candidates by identifying the system elements in each candidate solution.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759117_113432_23531", "image": "conc.png", "label": "What is the physical breakdown of the system?", "name": "What is the physical breakdown of the system?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F7_SECT", "color": "#ff2244", "domain": "Functional", "id": "_2024x_4c5019a_1725447776446_993396_779", "image": "vp.png", "label": "Security Context Viewpoint", "name": "Security Context Viewpoint", "purpose": "The Security Context viewpoint defines the Security Context, that describes the environment and all security relevant aspects of a System. This is the first step of the risk management process according to DIN EN ISO/IEC 27005:2024-05.\n\nThe Security Context describes all internal and external elements, boundaries, interconnections and assumptions that referes to the security of a system or an asset.\nDIN ISO 31000:2018-10 defines: \n\"The context of the risk management process should be derived from an understanding of the external and internal environment in which the organisation operates and should reflect the specific environment of the activity to which the risk management process is applied.\" ", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2024x_4c5019a_1718715464739_688953_54", "image": "conc.png", "label": "What are the Assumptions regarding the context Elements?", "name": "What are the Assumptions regarding the context Elements?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2024x_4c5019a_1718714855467_803817_37", "image": "conc.png", "label": "What are the Attack Vectors?", "name": "What are the Attack Vectors?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2024x_4c5019a_1718715061610_325235_44", "image": "conc.png", "label": "Who are the potential adversaries?", "name": "Who are the potential adversaries?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F7_RIAN", "color": "#ff2244", "domain": "Functional", "id": "_2024x_4c5019a_1729850878319_101841_4365", "image": "vp.png", "label": "Security Risk Analysis Viewpoint", "name": "Security Risk Analysis Viewpoint", "purpose": "tbd", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2024x_4c5019a_1718715703235_799252_75", "image": "conc.png", "label": "How high is the Risk?", "name": "How high is the Risk?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2024x_2a0c05a1_1731018691176_346076_118", "image": "conc.png", "label": "What are the Security Measures?", "name": "What are the Security Measures?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2024x_2a0c05a1_1731018562402_224934_115", "image": "conc.png", "label": "What are the Security Requirements?", "name": "What are the Security Requirements?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "O2_STID", "color": "#ff2244", "domain": "Operational", "id": "_19_0_2_26f0132_1565093441772_881981_49327", "image": "vp.png", "label": "Stakeholder Identification Viewpoint", "name": "Stakeholder Identification Viewpoint", "purpose": "The Stakeholder Identification Viewpoint of the operational domain strives to identify Stakeholders, who\u0027s concerns shall be considered, and adequatley adressed by the intended solution. Relations ", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#808080", "id": "_19_0_2_ebf0350_1567281039295_665940_53199", "image": "sth.png", "label": "Project Manager", "name": "Project Manager", "shape": "image", "size": 32, "type": "stakeholder"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758728_957718_23218", "image": "conc.png", "label": "In which phases of the life cycle is a Stakeholder involved in the project?", "name": "In which phases of the life cycle is a Stakeholder involved in the project?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759190_739382_23597", "image": "conc.png", "label": "What concerns and rationals does a Stakeholder have?", "name": "What concerns and rationals does a Stakeholder have?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759059_36560_23481", "image": "conc.png", "label": "What relevant relations and influences exist between Stakeholders?", "name": "What relevant relations and influences exist between Stakeholders?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758881_572143_23359", "image": "conc.png", "label": "Which Stakeholders are relevant to the system and might impose requirements?", "name": "Which Stakeholders are relevant to the system and might impose requirements?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758668_120660_23139", "image": "conc.png", "label": "Which external entities (external systems, environments, etc.) does a Stakeholder represent?", "name": "Which external entities (external systems, environments, etc.) does a Stakeholder represent?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "O6_SKRD", "color": "#ff2244", "domain": "Operational", "id": "_19_0_2_26f0132_1565093441772_890565_49326", "image": "vp.png", "label": "Stakeholder Requirement Definition Viewpoint", "name": "Stakeholder Requirement Definition Viewpoint", "purpose": "The Stakeholder Requirement Definition Viewpoint specifies all capabilities, functions and properties, that the intended solution shall possess or expose from the perspective of the Stakeholders. The Stakeholder Requirement Definition Viewpoint also captures constraints for the system to be developed from stakeholders perspective.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758810_143872_23303", "image": "conc.png", "label": "What are the normal and extreme environmental conditions for normal operation, for not operational, for storage, and for transport?", "name": "What are the normal and extreme environmental conditions for normal operation, for not operational, for storage, and for transport?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758798_122991_23285", "image": "conc.png", "label": "What are the requirements of environmental conditions imposed on the system?", "name": "What are the requirements of environmental conditions imposed on the system?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758774_361095_23253", "image": "conc.png", "label": "What are the requirements that a Stakeholder imposes on the system?", "name": "What are the requirements that a Stakeholder imposes on the system?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758818_166273_23310", "image": "conc.png", "label": "What defines a valid solution towards the customer?", "name": "What defines a valid solution towards the customer?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759042_480392_23467", "image": "conc.png", "label": "What is the range of acceptable system performance, i.e. the critical, top-level performance requirements derived from the operational needs?", "name": "What is the range of acceptable system performance, i.e. the critical, top-level performance requirements derived from the operational needs?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758902_700830_23378", "image": "conc.png", "label": "what has to be validated to the customer at system level?", "name": "what has to be validated to the customer at system level?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F2_SCYD", "color": "#ff2244", "domain": "Functional", "id": "_19_0_4_6d8019d_1618757838536_301313_442", "image": "vp.png", "label": "System Capability Definition Viewpoint", "name": "System Capability Definition Viewpoint", "purpose": "The System Capability Definition Viewpoint defines a taxonomy of Capabilities including composition, specialization, and dependency relationships between System Capabilities.\nNote: Connecting capabilities to requirements creates a linkage between two different types of conceptual problem description that helps manage the complexity of the system. At a high level of abstraction, capabilities allow an system architect to plan phases of the system evolution without the need to bear details in mind. Those details will not be lost if they are captured as requirements and traced to a corresponding capability. There is one key difference between capabilities and requirements: Requirements come from different sources, sponsored by different stakeholders, and are usually captured at different levels of abstraction. In contrast, capabilities should always represent a coherent and consolidated view of the system.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759126_506455_23537", "image": "conc.png", "label": "What are the capabilities that are supported by the system?", "name": "What are the capabilities that are supported by the system?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F1_SCXD", "color": "#ff2244", "domain": "Functional", "id": "_19_0_4_6d8019d_1618589543897_213858_307", "image": "vp.png", "label": "System Context Definition Viewpoint", "name": "System Context Definition Viewpoint", "purpose": "The System Context Definition Viewpoint defines how the SOI is embedded in its environment, i.e., where the boundary of the SOI is and who the external entities are the SOI interacts with (e.g., users, other external systems, environmental conditions, etc.).  In addition, the System Context Definition Viewpoint serves as architecture concept to demonstrate how the architecture description defined in the Operational Context Definition Viewpoint is realized.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759075_442496_23491", "image": "conc.png", "label": "Where and what are the geographical and physical locations of the intended or proposed elements of the solution?", "name": "Where and what are the geographical and physical locations of the intended or proposed elements of the solution?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758971_129300_23418", "image": "conc.png", "label": "Which are the external conceptual entities the system interacts with in the given context?", "name": "Which are the external conceptual entities the system interacts with in the given context?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F1_SCXE", "color": "#ff2244", "domain": "Functional", "id": "_19_0_4_6d8019d_1618060963677_605184_292", "image": "vp.png", "label": "System Context Exchange Viewpoint", "name": "System Context Exchange Viewpoint", "purpose": "The System Context Exchange Viewpoint serves for the identification and definition of external interfaces of the SOI that are used to interact, e.g., users, external systems, and other external entities defined in the given context of the SOI. The System Context Exchange Viewpoint\n* identifies system interfaces on a functional level,\n* states to which external entities the system interfaces are connected to,\n* and defines the usage of interfaces, e.g., when only a subset of the interface is used.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#808080", "id": "_19_0_2_26f0132_1566037895381_430904_56516", "image": "sth.png", "label": "Maintainer", "name": "Maintainer", "shape": "image", "size": 32, "type": "stakeholder"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758710_799233_23181", "image": "conc.png", "label": "How is the system interacting with the identified external entities?", "name": "How is the system interacting with the identified external entities?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758808_527146_23298", "image": "conc.png", "label": "Which are the conceptual interfaces of the system?", "name": "Which are the conceptual interfaces of the system?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758778_979635_23258", "image": "conc.png", "label": "Which are the interface requirements imposed on the system?", "name": "Which are the interface requirements imposed on the system?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759154_22704_23559", "image": "conc.png", "label": "Which kind of conceptual items (energy, material, information, etc.) are exchanged between the system and external entities?", "name": "Which kind of conceptual items (energy, material, information, etc.) are exchanged between the system and external entities?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F4_SCXI", "color": "#ff2244", "domain": "Functional", "id": "_19_0_4_26f0132_1626790419043_61789_443", "image": "vp.png", "label": "System Context Interaction Viewpoint", "name": "System Context Interaction Viewpoint", "purpose": "The System Context Interaction Viewpoint describes the System external behavior based on the exchange between Logical SOI and Logical Context Elements Usage in a given System Context. It depicts the sequence of interactions between the Logical SOI, the Context Elements and the exchanged Domain Item Kinds needed to accomplish a given System Process. \nNote: The System Context Interaction Viewpoint may refine a System Use Case.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758841_451500_23327", "image": "conc.png", "label": "How is the system being used or utilized and interacting with other external systems to satisfy user needs?", "name": "How is the system being used or utilized and interacting with other external systems to satisfy user needs?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1697718624828_512543_29114", "image": "conc.png", "label": "What is the sequence of interactions among the system and context elements on concpetual level?", "name": "What is the sequence of interactions among the system and context elements on concpetual level?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F2_SDIK", "color": "#ff2244", "domain": "Functional", "id": "_19_0_2_26f0132_1562303526536_778418_92552", "image": "vp.png", "label": "System Domain Item Kind Viewpoint", "name": "System Domain Item Kind Viewpoint", "purpose": "The System Domain Item Kind Viewpoint captures system wide concepts and collects type definitions for any exchanged item, e.g., information, material, or energy, of the Functional and Logical domain. Its purpose is to define these item types and their relationships. Furthermore, the System Domain Item Kind Viewpoint specifies the data types, entity types, related value types, and units that are used by the SOI.\nNote: Domain Item Kinds are used as types of function input and output in the Functional Domain, and for types of interfaces in the Logical Domain. They specify what is to be exchanged but not how.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_6d8019d_1693308265004_421376_24972", "image": "conc.png", "label": "Which kind of conceptual items (energy, material, information, etc.)  are used in the logical architecture of the system?", "name": "Which kind of conceptual items (energy, material, information, etc.)  are used in the logical architecture of the system?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F2_SFBS", "color": "#ff2244", "domain": "Functional", "id": "_19_0_4_26f0132_1629448496383_291730_10342", "image": "vp.png", "label": "System Functional Breakdown Structure Viewpoint", "name": "System Functional Breakdown Structure Viewpoint", "purpose": "The System Functional Breakdown Structure Viewpoint defines the structured, modular functional breakdown of the SOI beginning with System Processes, over identified System Functions further refined down to System Partial Functions. The reuse of System Functions, and System Partial Functions over Function Trees of the SOI is facilitated. ", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758790_775644_23272", "image": "conc.png", "label": "How are the system functions decomposed into smaller, and more manageable sub-functions? ", "name": "How are the system functions decomposed into smaller, and more manageable sub-functions? ", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758728_463822_23204", "image": "conc.png", "label": "What is the breakdown of functions into sub-functions?", "name": "What is the breakdown of functions into sub-functions?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758649_392764_23120", "image": "conc.png", "label": "Which functions will the system provide?", "name": "Which functions will the system provide?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F3_SFRE", "color": "#ff2244", "domain": "Functional", "id": "_2021x_2_8710274_1676723256334_812178_26576", "image": "vp.png", "label": "System Functional Refinement Viewpoint", "name": "System Functional Refinement Viewpoint", "purpose": "The System Functional Refinement Viewpoint analyses decomposition of System Functions into System Partial Functions in order achieve understanding and agreement about the System functions sufficient to derive system  requirements.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758994_378916_23438", "image": "conc.png", "label": "What are the interactions and dependencies between the different identified sub-functions?", "name": "What are the interactions and dependencies between the different identified sub-functions?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F5_SIFD", "color": "#ff2244", "domain": "Functional", "id": "_2021x_2_8710274_1676723513864_806117_26880", "image": "vp.png", "label": "System Interface Definition Viewpoint", "name": "System Interface Definition Viewpoint", "purpose": "The System Interface Definition Viewpoint captures system wide concepts defining interfaces. It allows to adopt long-lived standards and to harmonize conceptual interface definitions to improve interchangeability, interoperability, and portability.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1698695260372_8568_48717", "image": "conc.png", "label": "Which are the interface definitions for the logical architecture?", "name": "Which are the interface definitions for the logical architecture?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F3_SPRO", "color": "#ff2244", "domain": "Functional", "id": "_19_0_2_8710274_1567167552896_772779_54664", "image": "vp.png", "label": "System Process Viewpoint", "name": "System Process Viewpoint", "purpose": "The System Process Viewpoint provides the functional representation of the system using a black-box approach\n* the representation of the SOI and all Context Elements\n* the System Functions the SOI shall be able to perform\n* the Context Functions the Context Elements are expected to perform\n* the exchange between SOI System Functions and Context Functions of Context Elements\n* the functional flows crossing the boundary between SOI and Context Elements", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758952_658537_23403", "image": "conc.png", "label": "How does a system function interact with its environment?", "name": "How does a system function interact with its environment?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758674_250912_23143", "image": "conc.png", "label": "What are necessary inputs for operating the system expected to be provided by other external entitys?", "name": "What are necessary inputs for operating the system expected to be provided by other external entitys?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758630_745758_23103", "image": "conc.png", "label": "What are the scenarios a system function is utilized in?", "name": "What are the scenarios a system function is utilized in?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758960_189958_23415", "image": "conc.png", "label": "What is the functional scope of the system?", "name": "What is the functional scope of the system?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758798_462644_23290", "image": "conc.png", "label": "What services are expected from external entities?", "name": "What services are expected from external entities?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758924_539039_23390", "image": "conc.png", "label": "Which functions are out of scope of the system?", "name": "Which functions are out of scope of the system?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F6_SRQD", "color": "#ff2244", "domain": "Functional", "id": "_19_0_2_26f0132_1565104337297_671823_55529", "image": "vp.png", "label": "System Requirement Definition Viewpoint", "name": "System Requirement Definition Viewpoint", "purpose": "The System Requirement Definition Viewpoint specifies functions, non-functional properties, or constraints of the System. System Requirements are captured, the interrelationships between Functional and Non-Functional Requirements on the same level of abstraction and the traceability to Stakeholder Requirements are depicted.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758978_464279_23425", "image": "conc.png", "label": "What are the exchange requirements imposed on the system?", "name": "What are the exchange requirements imposed on the system?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758860_195868_23350", "image": "conc.png", "label": "What are the functional requirements imposed on the system?", "name": "What are the functional requirements imposed on the system?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758640_180559_23118", "image": "conc.png", "label": "What are the non-functional requirements imposed on the system?", "name": "What are the non-functional requirements imposed on the system?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758563_692887_23057", "image": "conc.png", "label": "Which System Requirements are derived from Stakeholder Requirements?", "name": "Which System Requirements are derived from Stakeholder Requirements?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F8_SRQT", "color": "#ff2244", "domain": "Functional", "id": "_19_0_2_26f0132_1565093441772_728957_49328", "image": "vp.png", "label": "System Requirement Traceability Viewpoint", "name": "System Requirement Traceability Viewpoint", "purpose": "The System Requirement Traceability Viewpoint specifies for every System Requirement the traceability to the functional domain level\n* System Use Case\n* System Capability\n* System Context Definition\n* System Context Exchange\n* System Context Interaction\n* System Process\n* System State", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758848_939582_23337", "image": "conc.png", "label": "What is the rationale for a system requirement?", "name": "What is the rationale for a system requirement?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758668_405619_23141", "image": "conc.png", "label": "Which system function is addressed by a system requirement?", "name": "Which system function is addressed by a system requirement?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576758640_156873_23115", "image": "conc.png", "label": "Which system interface is addressed by a system requirement?", "name": "Which system interface is addressed by a system requirement?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F3_SSTA", "color": "#ff2244", "domain": "Functional", "id": "_19_0_2_26f0132_1562303526536_189439_92549", "image": "vp.png", "label": "System State Viewpoint", "name": "System State Viewpoint", "purpose": "The System State Viewpoint defines the conditions of the SOI or parts of thereof that constrain the execution of System Functions. System States are used as pre- or post-condition of System Use Cases, and as constraints within the definition of System Functions to specifying valid transitions. Valid transitions between System States and the conditions for transitioning are specified in system wide concepts captured in System Requirements.", "shape": "image", "size": 32, "type": "viewpoint"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759199_155259_23602", "image": "conc.png", "label": "Which modes and states does the system have?", "name": "Which modes and states does the system have?", "shape": "image", "size": 24, "type": "concern"}, {"color": "#F000F0", "id": "_2021x_2_8710274_1674576759086_661396_23504", "image": "conc.png", "label": "Which system functions are dependent on a systems mode or state?", "name": "Which system functions are dependent on a systems mode or state?", "shape": "image", "size": 24, "type": "concern"}, {"VP_ID": "F1_SUCD", "color": "#ff2244", "domain": "Functional", "id": "_19_0_1_26f0132_1554446728606_740631_45702", "image": "vp.png", "label": "System Use Case Viewpoint", "name": "System Use Case Viewpoint", "purpose": "The System Use Case Viewpoint provides an outside view on the system functionality from the perspective of the system users and contributes to the definition of system requirements and system usage. The intended system use may be captured as free-text use case description, as well as storytelling approach on a coarse level of detail. The main system exchange partners participating in the intended system use are identified. System use cases are related to a specific system context. System use cases are derived from operational scenarios elaborated during mission analysis.", "sh             // Interne Felder ignorieren
            if (["id", "size", "label", "shape", "title", "x", "y", "from", "to", "arrows", "color", "width"].indexOf(key) === -1) {
                html += "<tr style='border-bottom:1px solid #eee;'><td style='padding:5px;'><b>" + key + ":</b></td><td>" + data[key] + "</td></tr>";
            }
        }
        html += "</table>";
        document.getElementById("details").innerHTML = html;
    }

    // Event: Knoten ausgewählt
    network.on("selectNode", function (params) {
        var nodeData = nodes.get(params.nodes[0]);
        updateSidebar(nodeData, "Node: " + nodeData.label);
    });

    // Event: Kante ausgewählt
    network.on("selectEdge", function (params) {
        // Falls ein Knoten ausgewählt wurde, feuert selectEdge oft mit. 
        // Wir priorisieren den Knoten, falls vorhanden:
        if (params.nodes.length > 0) return; 
        
        var edgeData = edges.get(params.edges[0]);
        updateSidebar(edgeData, "Edge: " + (edgeData.label || "Verbindung"));
    });

    // Event: Auswahl aufgehoben
    network.on("deselectNode", function () { document.getElementById("details").innerHTML = "Klicken Sie auf ein Element..."; });
    network.on("deselectEdge", function () { document.getElementById("details").innerHTML = "Klicken Sie auf ein Element..."; });
    </script>
